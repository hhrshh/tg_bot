services:
  postgres:
    image: postgres:16
    container_name: tg_postgres
    restart: unless-stopped
    env_file:
      - ./.env.postgres
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./volume/postgres:/var/lib/postgresql/data
    secrets:
      - postgres_password

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
